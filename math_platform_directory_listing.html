*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-mono);font-size:13px}
.tree{padding:12px 0 16px;line-height:1.6;color:var(--color-text-primary)}
.folder,.file{display:flex;align-items:center;gap:6px;padding:1px 0;cursor:default;white-space:nowrap}
.folder{cursor:pointer;user-select:none}
.folder:hover .label{color:var(--color-text-primary)}
.folder .label{color:var(--color-text-secondary);font-weight:500}
.file .label{color:var(--color-text-tertiary)}
.file .label.py{color:#3B6D11}.file .label.ts{color:#185FA5}.file .label.tsx{color:#185FA5}
.file .label.json{color:#854F0B}.file .label.md{color:#712B13}.file .label.env{color:#5F5E5A}
.file .label.css{color:#993556}.file .label.sql{color:#993C1D}.file .label.yml{color:#3C3489}
.icon{font-size:13px;flex-shrink:0;width:16px;text-align:center}
.children{margin-left:20px;border-left:1px solid var(--color-border-tertiary);padding-left:8px}
.toggle{display:inline-block;width:10px;text-align:center;color:var(--color-text-tertiary);font-size:10px;flex-shrink:0}
.badge{font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px;font-family:var(--font-sans);font-weight:500}
.badge.admin{background:#F1EFE8;color:#5F5E5A}.badge.teacher{background:#EAF3DE;color:#3B6D11}
.badge.student{background:#EEEDFE;color:#534AB7}.badge.shared{background:#E6F1FB;color:#185FA5}
@media(prefers-color-scheme:dark){
.badge.admin{background:#2C2C2A;color:#B4B2A9}.badge.teacher{background:#173404;color:#97C459}
.badge.student{background:#26215C;color:#AFA9EC}.badge.shared{background:#042C53;color:#85B7EB}}
.search{width:100%;padding:6px 10px;border:1px solid var(--color-border-secondary);border-radius:6px;
  background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-mono);
  font-size:12px;margin-bottom:10px;outline:none}
.search:focus{border-color:var(--color-border-primary)}
.stats{font-size:11px;color:var(--color-text-tertiary);margin-bottom:8px;font-family:var(--font-sans)}
.hidden{display:none}
</style>

function ext(name){const m=name.match(/\.(\w+)$/);return m?m[1]:''}
function fileIcon(e){return{py:'🐍',ts:'📘',tsx:'⚛',json:'{}',md:'📄',css:'🎨',sql:'🗄',yml:'⚙',env:'🔒'}[e]||'📄'}
function badgeHtml(b){return b?`<span class="badge ${b}">${b}</span>`:'' }

let totalFiles=0,totalFolders=0;

function buildNode(node,depth=0){
  if(node.type==='file'){
    totalFiles++;
    const e=ext(node.name);
    return `<div class="file" data-name="${node.name.toLowerCase()}">
      <span class="icon">${fileIcon(e)}</span>
      <span class="label ${e}">${node.name}</span>
    </div>`;
  }
  totalFolders++;
  const childHtml=(node.children||[]).map(c=>buildNode(c,depth+1)).join('');
  const open=node.open!==false;
  return `<div class="folder-wrap" data-folder="${node.name.toLowerCase()}">
    <div class="folder" onclick="toggleFolder(this)">
      <span class="toggle">${open?'▾':'▸'}</span>
      <span class="icon">📁</span>
      <span class="label">${node.name}</span>
      ${badgeHtml(node.badge)}
    </div>
    <div class="children" style="${open?'':'display:none'}">${childHtml}</div>
  </div>`;
}

function toggleFolder(el){
  const children=el.nextElementSibling;
  const toggle=el.querySelector('.toggle');
  const hidden=children.style.display==='none';
  children.style.display=hidden?'':'none';
  toggle.textContent=hidden?'▾':'▸';
}

function filterTree(q){
  const v=q.toLowerCase().trim();
  document.querySelectorAll('.file').forEach(el=>{
    el.classList.toggle('hidden',v&&!el.dataset.name.includes(v));
  });
  document.querySelectorAll('.folder-wrap').forEach(wrap=>{
    if(!v){wrap.classList.remove('hidden');return;}
    const hasVisible=[...wrap.querySelectorAll('.file')].some(f=>!f.classList.contains('hidden'));
    wrap.classList.toggle('hidden',!hasVisible);
    const ch=wrap.querySelector('.children');
    if(ch&&hasVisible)ch.style.display='';
  });
  const visible=document.querySelectorAll('.file:not(.hidden)').length;
  document.getElementById('stats').textContent=v
    ?`${visible} file${visible!==1?'s':''} matching "${q}"`
    :`${totalFiles} files · ${totalFolders} folders`;
}

const tree=document.getElementById('tree');
tree.innerHTML=buildNode(data);
document.getElementById('stats').textContent=`${totalFiles} files · ${totalFolders} folders`;
